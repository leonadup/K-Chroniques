<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Les K-Chroniques de Léona — Accès</title>
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <main class="fds-login-wrap">
    <form class="fds-login-card" id="login-form">
      <h1 style="font-size:22px; margin-bottom:6px;">Les K-Chroniques de Léona</h1>
      <p style="font-size:13px; color:var(--ink-soft); margin-bottom:20px;">Entre ton code d'accès.</p>

      <div class="field">
        <label>Cercle</label>
        <select id="circle-select">
          <option value="parents">Parents</option>
          <option value="famille">Famille</option>
          <option value="amis">Amis</option>
          <option value="copain">Copain</option>
        </select>
      </div>

      <div class="field">
        <label>Code</label>
        <input type="password" id="code-input" autofocus required />
      </div>

      <p class="error-text" id="error-text" style="display:none;"></p>

      <button type="submit" class="btn" style="width:100%; margin-top:8px;">Entrer</button>

      <p class="hint-text" style="margin-top:16px;">
        Tu es Léona ? <a href="moi.html" style="color:var(--persimmon);">Connexion admin</a>
      </p>
    </form>
  </main>

  <script type="module">
    import { checkCode, setCircle } from './assets/js/auth.js';

    const params = new URLSearchParams(window.location.search);
    const preset = params.get('cercle');
    const select = document.getElementById('circle-select');
    if (preset && [...select.options].some((o) => o.value === preset)) {
      select.value = preset;
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const circleId = select.value;
      const code = document.getElementById('code-input').value;
      const errorText = document.getElementById('error-text');

      if (checkCode(circleId, code)) {
        setCircle(circleId);
        window.location.href = 'cercle.html';
      } else {
        errorText.textContent = 'Code incorrect.';
        errorText.style.display = 'block';
      }
    });
  </script>
</body>
</html>
