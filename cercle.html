<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Les K-Chroniques de Léona</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" href="assets/icons/favicon-32.png" />
  <meta name="theme-color" content="#c1502b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
  <div id="fds-root">
    <div class="fds-header">
      <div>
        <p class="fds-title">Les K-Chroniques de Léona</p>
        <p class="fds-circle-tag" id="circle-tag"></p>
      </div>
      <div style="display: flex; gap: 8px; align-items: center">
        <button class="fds-logout" id="notif-btn" style="display: none"></button>
        <button class="fds-logout" id="logout-btn">Se déconnecter</button>
      </div>
    </div>

    <div class="fds-bandeau" id="notif-ios-hint" style="display: none">
      <div class="fds-bandeau-item">
        <span class="fds-bandeau-value">
          📲 Pour recevoir les notifications sur iPhone : appuie sur <b>Partager</b> puis
          <b>Sur l'écran d'accueil</b>, puis reviens ici depuis cette nouvelle icône.
        </span>
      </div>
    </div>

    <div class="fds-bandeau" id="bandeau" style="display: none"></div>

    <div class="fds-tabs">
      <button class="fds-tab active" data-tab="timeline">Timeline</button>
      <button class="fds-tab" data-tab="recits">Récits</button>
      <button class="fds-tab" data-tab="galerie">Galerie</button>
      <button class="fds-tab" data-tab="carte">Carte</button>
      <button class="fds-tab" data-tab="lettres" id="lettres-tab" style="display: none">Lettres</button>
      <button class="fds-tab" data-tab="discussions">Discussions <span class="fds-tab-badge" id="discussions-badge" style="display: none"></span></button>
    </div>

    <div class="fds-feed" id="panel-timeline"></div>
    <div class="fds-feed" id="panel-recits" style="display: none"></div>
    <div class="fds-feed" id="panel-galerie" style="display: none"></div>
    <div class="fds-feed fds-feed-carte" id="panel-carte" style="display: none">
      <div id="carte-map" class="fds-map"></div>
    </div>
    <div class="fds-feed" id="panel-lettres" style="display: none"></div>
    <div class="fds-feed" id="panel-discussions" style="display: none">
      <div id="discussion-box"></div>
    </div>
  </div>

  <div id="entry-modal-mount"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="assets/js/cercle-page.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
