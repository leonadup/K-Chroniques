<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Les K-Chroniques de Léona — Moi</title>
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <div id="login-wrap" class="adm-login-wrap">
    <form class="adm-login-card" id="moi-login-form">
      <h1 style="font-size: 22px; margin-bottom: 6px">Moi</h1>
      <p style="font-size: 13px; color: var(--ink-soft); margin-bottom: 20px">Connexion admin.</p>

      <div class="field">
        <label>Email</label>
        <input type="email" id="moi-email" autofocus required />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="moi-password" required />
      </div>

      <p class="error-text" id="moi-login-error" style="display: none"></p>

      <button type="submit" class="btn" style="width: 100%; margin-top: 8px">Entrer</button>
    </form>
  </div>

  <div id="adm-root" style="display: none">
    <div class="adm-header">
      <p class="adm-title">Moi</p>
      <button class="fds-logout" id="moi-logout-btn">Se déconnecter</button>
    </div>

    <div class="adm-tabs">
      <button class="adm-tab active" data-tab="finances">Finances</button>
      <button class="adm-tab" data-tab="recits">Récits</button>
      <button class="adm-tab" data-tab="lettres">Lettres</button>
      <button class="adm-tab" data-tab="bandeau">Bandeau</button>
      <button class="adm-tab" data-tab="questions">Questions <span class="adm-tab-badge" id="questions-badge" style="display: none"></span></button>
    </div>

    <div class="adm-panel-wrap">
      <div id="panel-finances"></div>
      <div id="panel-recits" style="display: none"></div>
      <div id="panel-lettres" style="display: none"></div>
      <div id="panel-bandeau" style="display: none"></div>
      <div id="panel-questions" style="display: none"></div>
    </div>
  </div>

  <script type="module" src="assets/js/moi-page.js"></script>
</body>
</html>
