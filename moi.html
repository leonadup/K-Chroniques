<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Les K-Chroniques de Léona — Moi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" href="assets/icons/favicon-32.png" />
  <meta name="theme-color" content="#c1502b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
  <div id="login-wrap" class="adm-login-wrap">
    <form class="adm-login-card" id="moi-login-form">
      <h1 style="font-size: 22px; margin-bottom: 6px">Moi</h1>
      <p style="font-size: 13px; color: var(--ink-soft); margin-bottom: 20px">Connexion admin.</p>

      <div class="field">
        <label>Email</label>
        <input type="email" id="moi-email" autofocus required />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="moi-password" required />
      </div>

      <p class="error-text" id="moi-login-error" style="display: none"></p>

      <button type="submit" class="btn" style="width: 100%; margin-top: 8px">Entrer</button>
    </form>
  </div>

  <div id="adm-root" style="display: none">
    <div class="adm-header">
      <p class="adm-title">Moi</p>
      <div style="display: flex; gap: 8px; align-items: center">
        <button class="fds-logout" id="notif-btn" style="display: none"></button>
        <button class="fds-logout" id="moi-logout-btn">Se déconnecter</button>
      </div>
    </div>

    <div class="adm-tabs">
      <button class="adm-tab active" data-tab="finances">Finances</button>
      <button class="adm-tab" data-tab="recits">Récits</button>
      <button class="adm-tab" data-tab="lettres">Lettres</button>
      <button class="adm-tab" data-tab="bandeau">Bandeau</button>
      <button class="adm-tab" data-tab="discussions">Discussions <span class="adm-tab-badge" id="discussions-badge" style="display: none"></span></button>
      <button class="adm-tab" data-tab="coreen">Coréen</button>
      <button class="adm-tab" data-tab="journal">Journal</button>
      <button class="adm-tab" data-tab="checklist">Checklist</button>
      <button class="adm-tab" data-tab="urgence">Urgence</button>
      <button class="adm-tab" data-tab="envies">Envies</button>
      <button class="adm-tab" data-tab="notes">Notes</button>
    </div>

    <div class="adm-panel-wrap">
      <div id="panel-finances"></div>
      <div id="panel-recits" style="display: none"></div>
      <div id="panel-lettres" style="display: none"></div>
      <div id="panel-bandeau" style="display: none"></div>
      <div id="panel-discussions" style="display: none"></div>
      <div id="panel-coreen" style="display: none"></div>
      <div id="panel-journal" style="display: none"></div>
      <div id="panel-checklist" style="display: none"></div>
      <div id="panel-urgence" style="display: none"></div>
      <div id="panel-envies" style="display: none"></div>
      <div id="panel-notes" style="display: none"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="assets/js/moi-page.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
